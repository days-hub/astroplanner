services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: astroplanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astroplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://astro:${POSTGRES_PASSWORD}@db:5432/astroplanner
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      # Same-origin via the nginx proxy, so CORS only matters for extra origins
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081}
      # Optional: enables the Sky advisor (LLM recommendations). Empty = off.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ADVISOR_MODEL: ${ADVISOR_MODEL:-claude-opus-4-8}
      # Demo mode (off here; the prod overlay flips these to demo-only).
      DEMO_MODE: ${DEMO_MODE:-false}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      DEMO_USER_TTL_HOURS: ${DEMO_USER_TTL_HOURS:-24}
      RATE_LIMIT_DEMO_PER_HOUR: ${RATE_LIMIT_DEMO_PER_HOUR:-30}
      RATE_LIMIT_DEMO_ADVISOR_PER_DAY: ${RATE_LIMIT_DEMO_ADVISOR_PER_DAY:-5}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      # Loopback-only: locally you browse http://localhost:8081; in
      # production Caddy (docker-compose.prod.yml) is the public entrance
      # and reaches the frontend over the compose network.
      # (8081 because a local Apache on this machine occupies 8080.)
      - "127.0.0.1:${FRONTEND_PORT:-8081}:80"
    depends_on:
      - backend

volumes:
  pgdata:
